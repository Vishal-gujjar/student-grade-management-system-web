<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Create Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="auth-body">

<div class="container py-4">

<!-- ================= TOP BAR ================= -->

<div class="d-flex justify-content-between align-items-center mb-4">

<a href="/"
class="btn btn-outline-light">

<i class="bi bi-arrow-left"></i>

Back

</a>

<h5 class="text-white fw-bold m-0">

<i class="bi bi-mortarboard-fill"></i>

Student Grade Manager

</h5>

</div>

<!-- ================= CARD ================= -->

<div class="auth-card">

<div class="auth-header">

<div class="auth-icon">

<i class="bi bi-person-plus-fill"></i>

</div>

<h2>

Create Your Student Account

</h2>

<p>

Join now and manage all your academic records
in one place.

</p>

</div>

<div class="auth-form">

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<form action="/create-account"
method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Name

</label>

<input
type="text"
class="form-control"
name="name"
value="{{ form.get('name','') }}"
placeholder="Enter your full name"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Gender

</label>

<select
class="form-select"
name="gender">

<option value="Male"
{% if form.get('gender')=="Male" %}selected{% endif %}>

Male

</option>

<option value="Female"
{% if form.get('gender')=="Female" %}selected{% endif %}>

Female

</option>

<option value="Other"
{% if form.get('gender')=="Other" %}selected{% endif %}>

Other

</option>

</select>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Father Name

</label>

<input
type="text"
class="form-control"
name="father_name"
value="{{ form.get('father_name','') }}"
placeholder="Father name"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Mother Name

</label>

<input
type="text"
class="form-control"
name="mother_name"
value="{{ form.get('mother_name','') }}"
placeholder="Mother name"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Date of Birth

</label>

<input
type="date"
class="form-control"
name="dob"
value="{{ form.get('dob','') }}"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Phone Number

</label>

<input
type="text"
class="form-control"
name="phone"
value="{{ form.get('phone','') }}"
placeholder="10-digit mobile number"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Email

</label>

<input
type="email"
class="form-control"
name="email"
value="{{ form.get('email','') }}"
placeholder="example@email.com"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Address

</label>

<textarea
class="form-control"
name="address"
rows="2"
placeholder="Enter your address">{{ form.get('address','') }}</textarea>

</div>

</div>


<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Password

</label>

<input
type="password"
class="form-control"
id="password"
name="password"
placeholder="Create password"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Confirm Password

</label>

<input
type="password"
class="form-control"
id="confirm_password"
name="confirm_password"
placeholder="Confirm password"
required>

</div>

</div>

<div class="form-check mb-4">

<input
class="form-check-input"
type="checkbox"
id="showPassword">

<label
class="form-check-label"
for="showPassword">

Show Password

</label>

</div>

<div class="d-grid">

<button
type="submit"
class="btn btn-primary auth-btn">

<i class="bi bi-person-plus-fill"></i>

Create Account

</button>

</div>

</form>

<div class="auth-footer">

Already have an account?

<a href="/login">

Login

</a>

</div>

</div>

</div>

</div>

<script>

const checkbox = document.getElementById("showPassword");

checkbox.addEventListener("change", function(){

    const password = document.getElementById("password");

    const confirm = document.getElementById("confirm_password");

    if(this.checked){

        password.type = "text";
        confirm.type = "text";

    }
    else{

        password.type = "password";
        confirm.type = "password";

    }

});

</script>

</body>

</html>
