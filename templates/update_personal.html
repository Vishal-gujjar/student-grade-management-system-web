<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Update Personal Details</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link
rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="auth-body">

<div class="container py-4">

<!-- TOP BAR -->

<div class="d-flex justify-content-between align-items-center mb-4">

<a href="/dashboard"
class="btn btn-outline-light auth-back">

<i class="bi bi-arrow-left"></i>

Back

</a>

<h5 class="text-white fw-bold m-0">

<i class="bi bi-mortarboard-fill"></i>

Student Grade Manager

</h5>

</div>

<!-- CARD -->

<div class="auth-card">

<div class="auth-header">

<div class="auth-icon">

<i class="bi bi-person-gear"></i>

</div>

<h2>

Update Personal Details

</h2>

<p>

Update your profile information below.

</p>

</div>

<div class="auth-form">

{% if error %}

<div class="alert alert-danger alert-dismissible fade show">

{{ error }}

<button
type="button"
class="btn-close"
data-bs-dismiss="alert">

</button>

</div>

{% endif %}

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Name

</label>

<input
type="text"
class="form-control"
name="name"
value="{{ form.get('name','') }}"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Gender

</label>

<select
class="form-select"
name="gender"
required>

<option value="">Select Gender</option>

<option value="Male"
{% if form.get("gender")=="Male" %}selected{% endif %}>

Male

</option>

<option value="Female"
{% if form.get("gender")=="Female" %}selected{% endif %}>

Female

</option>

<option value="Other"
{% if form.get("gender")=="Other" %}selected{% endif %}>

Other

</option>

</select>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Father Name

</label>

<input
type="text"
class="form-control"
name="father_name"
value="{{ form.get('father_name','') }}"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Mother Name

</label>

<input
type="text"
class="form-control"
name="mother_name"
value="{{ form.get('mother_name','') }}"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Date of Birth

</label>

<input
type="date"
class="form-control"
name="dob"
value="{{ form.get('dob','') }}"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Phone Number

</label>

<input
type="tel"
class="form-control"
name="phone"
value="{{ form.get('phone','') }}"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Email

</label>

<input
type="email"
class="form-control"
name="email"
value="{{ form.get('email','') }}"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Address

</label>

<input
type="text"
class="form-control"
name="address"
value="{{ form.get('address','') }}"
required>

</div>

</div>

<hr class="my-4">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

New Password

</label>

<input
type="password"
class="form-control"
id="password"
name="password">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Confirm New Password

</label>

<input
type="password"
class="form-control"
id="confirm_password"
name="confirm_password">

</div>

</div>

<div class="form-text mb-3">

Leave both password fields empty if you do not want to change your password.

</div>

<div class="form-check mb-4">

<input
class="form-check-input"
type="checkbox"
id="showPassword">

<label
class="form-check-label"
for="showPassword">

Show Password

</label>

</div>

<div class="text-end">

<button
type="submit"
class="btn btn-warning auth-btn">

<i class="bi bi-check-circle-fill"></i>

Update Details

</button>

</div>

</form>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script>

const checkbox = document.getElementById("showPassword");

checkbox.addEventListener("change", function(){

    const password = document.getElementById("password");
    const confirm = document.getElementById("confirm_password");

    if(this.checked){

        password.type = "text";
        confirm.type = "text";

    }
    else{

        password.type = "password";
        confirm.type = "password";

    }

});

</script>

</body>

</html>
