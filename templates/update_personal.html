<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Update Personal Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow">

                <div class="card-header bg-warning text-dark">

                    <h2>Update Personal Details</h2>

                </div>

                <div class="card-body">

                    {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form action="/update/personal" method="POST">


                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input
                                type="text"
                                class="form-control"
                                name="name"
                                value="{{ form.get('name','') }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Father Name</label>
                            <input
                                type="text"
                                class="form-control"
                                name="father_name"
                                value="{{ form.get('father_name','') }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mother Name</label>
                            <input
                                type="text"
                                class="form-control"
                                name="mother_name"
                                value="{{ form.get('mother_name','') }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Date of Birth</label>
                            <input
                                type="date"
                                class="form-control"
                                name="dob"
                                value="{{ form.get('dob','') }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Gender</label>

                            <select class="form-select" name="gender">

                                <option value="Male"
                                {% if form.get('gender')=="Male" %}selected{% endif %}>
                                Male
                                </option>

                                <option value="Female"
                                {% if form.get('gender')=="Female" %}selected{% endif %}>
                                Female
                                </option>

                                <option value="Other"
                                {% if form.get('gender')=="Other" %}selected{% endif %}>
                                Other
                                </option>

                            </select>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input
                                type="text"
                                class="form-control"
                                name="phone"
                                value="{{ form.get('phone','') }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input
                                type="email"
                                class="form-control"
                                name="email"
                                value="{{ form.get('email','') }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>

                            <textarea
                                class="form-control"
                                name="address"
                                rows="3">{{ form.get('address','') }}</textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">New Password</label>

                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                name="password">

                        </div>


                        <div class="mb-3">

                            <label class="form-label">Confirm New Password</label>

                            <input
                                type="password"
                                class="form-control"
                                id="confirm_password"
                                name="confirm_password">

                        </div>

                        <div class="form-text text-muted">
                        Leave both password fields empty if you do not want to change your password.
                        </div>

                        <div class="form-check mb-4">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="showPassword">

                            <label class="form-check-label" for="showPassword">
                                Show Password
                            </label>

                        </div>

                        <div class="mt-4 d-flex justify-content-between">

                            <a
                            href="/update"
                            class="btn btn-secondary">
                                ← Back
                            </a>

                            <button
                            type="submit"
                            class="btn btn-warning">
                                Update Details
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const checkbox = document.getElementById("showPassword");

checkbox.addEventListener("change", function(){

    const password = document.getElementById("password");
    const confirm = document.getElementById("confirm_password");

    if(this.checked){

        password.type = "text";
        confirm.type = "text";

    }
    else{

        password.type = "password";
        confirm.type = "password";

    }

});

</script>

</body>

</html>
